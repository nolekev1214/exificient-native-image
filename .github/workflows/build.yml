name: build

on:
  push:
    branches: [master, "ci/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  # Build the native shared library for each Linux architecture. Each leg runs on
  # a native runner (no QEMU) and produces a glibc-2.31-floored libexificient.so.
  build-linux:
    name: build-linux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build libexificient.so
        run: docker build -f Dockerfile.build -o "out/${{ matrix.arch }}" .

      - name: Stage schemas alongside the artifact
        run: cp -r schemas "out/${{ matrix.arch }}/schemas"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: libexificient-linux-${{ matrix.arch }}
          path: out/${{ matrix.arch }}/*
          if-no-files-found: error

  # Validate the Conan recipe against the freshly built binaries. Runs once per
  # arch using the matching artifact, so the package layout and cpp_info are
  # exercised on the same architecture the binary targets.
  conan-package:
    name: conan-package-${{ matrix.arch }}
    needs: build-linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: libexificient-linux-${{ matrix.arch }}
          path: prebuilt

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2.0"

      - name: Compute package version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Package prebuilt binary with Conan
        env:
          EXIFICIENT_PREBUILT_DIR: ${{ github.workspace }}/prebuilt
        run: |
          conan profile detect --force
          # export-pkg packages the already-built artifact in ./prebuilt without
          # rebuilding from source (consumers never need GraalVM).
          conan export-pkg . --version "${{ steps.ver.outputs.version }}"

      - name: Test the packaged library links and loads
        run: conan test test_package "exificient/${{ steps.ver.outputs.version }}"

      - name: Save the Conan package as a portable artifact
        run: |
          # Archive the recipe + binary into a tarball that any machine can pull
          # into its local Conan cache with `conan cache restore`.
          conan cache save "exificient/${{ steps.ver.outputs.version }}:*" \
            --file "conan-exificient-${{ matrix.arch }}.tgz"

      - name: Upload Conan package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conan-exificient-linux-${{ matrix.arch }}
          path: conan-exificient-${{ matrix.arch }}.tgz
          if-no-files-found: error

  # On a version tag, bundle every arch artifact into a single GitHub Release so
  # the Conan recipe (and manual consumers) can download per-arch binaries.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, conan-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist

      - name: Zip per-arch artifacts
        run: |
          cd dist
          for d in libexificient-*; do
            (cd "$d" && zip -r "../${d}.zip" .)
          done

      - name: Publish release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          files: dist/*.zip
